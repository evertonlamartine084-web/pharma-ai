services:
  - type: web
    name: pharma-ai-api
    runtime: python
    repo: https://github.com/evertonlamartine084-web/pharma-ai
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./pharma_ai.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.7

databases: []
